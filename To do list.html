<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My to do list</title>
    <link rel="stylesheet" href="ToDoList.css">
</head>
<body>
    
    <h1><span class="header1">To Do List</span></h1>
    <h2><span class="header2">Welcome to your To Do List</span></h2>
    <p><span class="para">This is a simple to do list where you can add the tasks in the below space:</span></p>
    <div class='input-container'>
        <input type="text" id="taskInput" placeholder="Enter your task here">
        <button id="addButton" type="button">Add Task</button>
        
        
        
            <button id="completeBtn" type="button">Complete Task</button>
    </div>
    <div class="list">
        <ul id="taskList"></ul>
    </div>

    <script src="ToDoList.js"></script>
</body>
</html>
